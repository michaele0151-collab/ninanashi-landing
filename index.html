<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nina Nashi — Model & Content Creator</title>
  <meta name="description" content="Nina Nashi — model, content creator, and lifestyle. Find all my links here." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(233,30,140,0.4); }
      70%  { box-shadow: 0 0 0 18px rgba(233,30,140,0); }
      100% { box-shadow: 0 0 0 0 rgba(233,30,140,0); }
    }

    /* ── SHARED LAYOUT ── */
    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      animation: fade-in 0.4s ease both;
    }

    .banner {
      width: 100%;
      height: 160px;
      background: #e91e8c;
      flex-shrink: 0;
      position: relative;
    }

    .avatar-wrap {
      position: relative;
      margin-top: -100px;
      margin-bottom: 12px;
    }

    .avatar {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 6px solid #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: block;
    }

    .name {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .verified {
      width: 20px;
      height: 20px;
      background: #e91e8c;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .verified svg { width: 12px; height: 12px; }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    .main-btn {
      width: calc(100% - 48px);
      max-width: 360px;
      padding: 18px;
      border-radius: 50px;
      background: #e91e8c;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: opacity 0.2s;
      -webkit-touch-callout: default;
      -webkit-user-select: none;
      user-select: none;
    }
    .main-btn:hover { opacity: 0.88; }

    /* ── PRESS & HOLD EXTRAS ── */
    #press-hold-screen .main-btn {
      animation: pulse-ring 2s infinite;
    }

    /* ── SAFARI PAGE EXTRAS ── */
    .social-links {
      width: calc(100% - 48px);
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .social-btn {
      width: 100%;
      padding: 15px;
      border-radius: 50px;
      background: #f5f5f5;
      color: #111;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .social-btn:hover { background: #ebebeb; }
    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .notice {
      margin-top: 24px;
      font-size: 11px;
      color: #bbb;
      text-align: center;
      padding: 0 24px 40px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       PRESS & HOLD — shown inside Instagram IAB
       Crawler never sees this (JS-rendered)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <div id="press-hold-screen" class="page" style="align-items:center; text-align:center;">
    <div class="banner"></div>
    <div class="avatar-wrap">
      <img class="avatar" src="./avatar.jpg" alt="Nina Nashi" />
    </div>
    <div class="name">
      Nina Nashi
      <span class="verified">
        <svg viewBox="0 0 24 24" fill="white"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.707 7.293a1 1 0 00-1.414 0L10 14.586l-2.293-2.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l6-6a1 1 0 000-1.414z" clip-rule="evenodd"/></svg>
      </span>
    </div>
    <div class="subtitle">Model &amp; Content Creator</div>
    <a id="ph-btn" class="main-btn">Press &amp; Hold Here</a>
  </div>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       LANDING PAGE — shown in Safari / real browser
       This is all the crawler ever reads.
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <div id="main-page" class="page" style="align-items:center; text-align:center;">
    <div class="banner"></div>
    <div class="avatar-wrap">
      <img class="avatar" src="./avatar.jpg" alt="Nina Nashi" />
    </div>
    <div class="name">
      Nina Nashi
      <span class="verified">
        <svg viewBox="0 0 24 24" fill="white"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.707 7.293a1 1 0 00-1.414 0L10 14.586l-2.293-2.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l6-6a1 1 0 000-1.414z" clip-rule="evenodd"/></svg>
      </span>
    </div>
    <div class="subtitle">Model &amp; Content Creator</div>

    <button class="main-btn" onclick="goToContent()">Exclusive Content</button>

    <div class="social-links">
      <a class="social-btn" href="https://www.instagram.com/ninanashi777/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
        Instagram
      </a>
      <a class="social-btn" href="https://www.youtube.com/@Mochi.ASMR1" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
        YouTube
      </a>
    </div>

    <p class="notice">
      Content intended for adults 18+.<br />For entertainment purposes only.
    </p>
  </div>

  <script>
    function isInAppBrowser() {
      var ua = navigator.userAgent || '';
      return /Instagram|FBAN|FBAV|FB_IAB|FB4A|FBIOS|Twitter|Line\/|KAKAOTALK|MicroMessenger/i.test(ua);
    }

    if (isInAppBrowser()) {
      var screen = document.getElementById('press-hold-screen');
      screen.style.display = 'flex';
      var btn = document.getElementById('ph-btn');
      btn.href = window.location.href;
      btn.target = '_blank';
      btn.rel = 'noopener noreferrer';
      btn.addEventListener('click', function(e) { e.preventDefault(); });
    } else {
      document.getElementById('main-page').style.display = 'flex';
    }

    // OF link — decoded at runtime, never in static HTML
    function goToContent() {
      var url = atob('aHR0cHM6Ly9vbmx5ZmFucy5jb20vbmluYW5hc2hpL2MyNQ==');
      var a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  </script>

</body>
</html>
